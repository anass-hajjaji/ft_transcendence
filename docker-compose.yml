version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: transcendence_nginx
    ports:
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    env_file:
      - ./nginx/.env
    depends_on:
      - frontend
      - backend

  redis:
    image: redis:alpine
    container_name: transcendence_redis_dev
    ports:
      - "6380:6379"
  
  backend:
    build:
      context: ./back_end
      dockerfile: Dockerfile
    container_name: transcendence_backend_dev
    volumes:
      - ./back_end/data:/app/data
      - ./back_end/uploads/avatars:/app/uploads/avatars
    env_file:
      - ./back_end/.env
    ports:
      - "4000:4000"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transcendence_frontend_dev
    env_file:
      - ./frontend/.env
    depends_on:
      - backend